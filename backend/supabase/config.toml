# Minimal Supabase CLI config for remote deploys (functions + secrets).
# The project is managed in the dashboard; local dev stack isn't used here.
project_id = "freelancetax"

[functions.ai-ask]
verify_jwt = true

[functions.ai-refresh-config]
verify_jwt = true

# Magic-link approval clicked from an email — the single-use token in the URL is
# the auth, so no project JWT is required.
[functions.approve-tax-config]
verify_jwt = false
